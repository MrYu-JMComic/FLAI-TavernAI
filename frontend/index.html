<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#8f3f2f" />
    <meta name="description" content="FLAI Tavern AI - 角色扮演聊天平台" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <title>FLAI Tavern AI</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          const isViteDev = location.port === '5173' || location.port === '5174';
          if (isViteDev) {
            navigator.serviceWorker.getRegistrations()
              .then((registrations) => Promise.all(registrations.map((registration) => registration.unregister())))
              .catch(() => {});
            if ('caches' in window) {
              caches.keys()
                .then((keys) => Promise.all(keys.filter((key) => key.startsWith('flai-')).map((key) => caches.delete(key))))
                .catch(() => {});
            }
            return;
          }

          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('SW registered:', registration.scope);
            })
            .catch((error) => {
              console.log('SW registration failed:', error);
            });
        });
      }
    </script>
  </body>
</html>
